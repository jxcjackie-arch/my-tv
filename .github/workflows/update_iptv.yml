name: Update IPTV M3U

on:
  schedule:
    # 每天北京时间早上 6 点自动运行一次 (UTC 时间 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许你随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 再次确保拥有写入权限

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Run checker script
      run: python update_m3u.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tv_live.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto update IPTV links"
        git push
